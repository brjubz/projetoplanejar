<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Planejar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.0/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: #0a0e27; color: #fff; }
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1f3a; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
    .login-box h1 { margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #aaa; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; }
    .btn { padding: 12px 24px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
    .btn:hover { background: #2563eb; }
    #loginError { color: #ef4444; margin: 15px 0; display: none; }
    .admin-layout { display: none; }
    .admin-layout.visible { display: block; }
    .admin-container { display: flex; height: 100vh; }
    .admin-sidebar { width: 250px; background: #0f1419; border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; overflow-y: auto; }
    .admin-content { flex: 1; display: flex; flex-direction: column; }
    .admin-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .admin-body { flex: 1; overflow-y: auto; padding: 20px; }
    .tab-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; cursor: pointer; text-align: left; }
    .tab-btn.active { background: #3b82f6; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h3 { margin-bottom: 15px; }
    .form-input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; background: rgba(255,255,255,0.03); color: #fff; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
    .grid > div { display: flex; flex-direction: column; }
    .grid label { font-size: 11px; color: #888; margin-bottom: 4px; }
    #prevenda_status { padding: 10px; border-radius: 6px; margin-top: 15px; }
  </style>
</head>
<body>

<div id="loginContainer" class="login-container">
  <div class="login-box">
    <h1>Admin Login</h1>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="adminmaster">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Senha">
    </div>
    <div id="loginError"></div>
    <button class="btn" onclick="handleLogin()">Entrar</button>
  </div>
</div>

<div id="adminLayout" class="admin-layout">
  <div class="admin-container">
    <div class="admin-sidebar">
      <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-btn" onclick="switchTab('prevenda')">Pre-Vendas</button>
    </div>
    <div class="admin-content">
      <div class="admin-header">
        <h2>Admin - Planejar</h2>
        <button class="btn" style="width: 100px;" onclick="handleLogout()">Sair</button>
      </div>
      <div class="admin-body">
        
        <div id="section-dashboard" class="section active">
          <h2>Dashboard</h2>
          <p>Bem-vindo ao admin</p>
        </div>

        <div id="section-prevenda" class="section">
          <h2>Configuracao - Pre-Vendas</h2>
          
          <div class="card">
            <h3>Atendimento</h3>
            <input type="text" id="prevenda_atend_id" class="form-input" placeholder="ID da planilha">
            <div class="grid">
              <div><label>Jan</label><input type="text" id="prevenda_atend_gid_jan" class="form-input"></div>
              <div><label>Fev</label><input type="text" id="prevenda_atend_gid_fev" class="form-input"></div>
              <div><label>Mar</label><input type="text" id="prevenda_atend_gid_mar" class="form-input"></div>
              <div><label>Abr</label><input type="text" id="prevenda_atend_gid_abr" class="form-input"></div>
              <div><label>Mai</label><input type="text" id="prevenda_atend_gid_mai" class="form-input"></div>
              <div><label>Jun</label><input type="text" id="prevenda_atend_gid_jun" class="form-input"></div>
              <div><label>Jul</label><input type="text" id="prevenda_atend_gid_jul" class="form-input"></div>
              <div><label>Ago</label><input type="text" id="prevenda_atend_gid_ago" class="form-input"></div>
              <div><label>Set</label><input type="text" id="prevenda_atend_gid_set" class="form-input"></div>
              <div><label>Out</label><input type="text" id="prevenda_atend_gid_out" class="form-input"></div>
              <div><label>Nov</label><input type="text" id="prevenda_atend_gid_nov" class="form-input"></div>
              <div><label>Dez</label><input type="text" id="prevenda_atend_gid_dez" class="form-input"></div>
            </div>
          </div>

          <div class="card">
            <h3>Vendas</h3>
            <input type="text" id="prevenda_vend_id" class="form-input" placeholder="ID da planilha">
            <div class="grid">
              <div><label>Jan</label><input type="text" id="prevenda_vend_gid_jan" class="form-input"></div>
              <div><label>Fev</label><input type="text" id="prevenda_vend_gid_fev" class="form-input"></div>
              <div><label>Mar</label><input type="text" id="prevenda_vend_gid_mar" class="form-input"></div>
              <div><label>Abr</label><input type="text" id="prevenda_vend_gid_abr" class="form-input"></div>
              <div><label>Mai</label><input type="text" id="prevenda_vend_gid_mai" class="form-input"></div>
              <div><label>Jun</label><input type="text" id="prevenda_vend_gid_jun" class="form-input"></div>
              <div><label>Jul</label><input type="text" id="prevenda_vend_gid_jul" class="form-input"></div>
              <div><label>Ago</label><input type="text" id="prevenda_vend_gid_ago" class="form-input"></div>
              <div><label>Set</label><input type="text" id="prevenda_vend_gid_set" class="form-input"></div>
              <div><label>Out</label><input type="text" id="prevenda_vend_gid_out" class="form-input"></div>
              <div><label>Nov</label><input type="text" id="prevenda_vend_gid_nov" class="form-input"></div>
              <div><label>Dez</label><input type="text" id="prevenda_vend_gid_dez" class="form-input"></div>
            </div>
          </div>

          <div class="card">
            <h3>Gastos</h3>
            <input type="text" id="prevenda_gast_id" class="form-input" placeholder="ID da planilha">
            <div class="grid">
              <div><label>Jan</label><input type="text" id="prevenda_gast_gid_jan" class="form-input"></div>
              <div><label>Fev</label><input type="text" id="prevenda_gast_gid_fev" class="form-input"></div>
              <div><label>Mar</label><input type="text" id="prevenda_gast_gid_mar" class="form-input"></div>
              <div><label>Abr</label><input type="text" id="prevenda_gast_gid_abr" class="form-input"></div>
              <div><label>Mai</label><input type="text" id="prevenda_gast_gid_mai" class="form-input"></div>
              <div><label>Jun</label><input type="text" id="prevenda_gast_gid_jun" class="form-input"></div>
              <div><label>Jul</label><input type="text" id="prevenda_gast_gid_jul" class="form-input"></div>
              <div><label>Ago</label><input type="text" id="prevenda_gast_gid_ago" class="form-input"></div>
              <div><label>Set</label><input type="text" id="prevenda_gast_gid_set" class="form-input"></div>
              <div><label>Out</label><input type="text" id="prevenda_gast_gid_out" class="form-input"></div>
              <div><label>Nov</label><input type="text" id="prevenda_gast_gid_nov" class="form-input"></div>
              <div><label>Dez</label><input type="text" id="prevenda_gast_gid_dez" class="form-input"></div>
            </div>
          </div>

          <button class="btn" style="background: #8b5cf6; margin-top: 20px;" onclick="salvarConfigPreVendas()">Salvar</button>
          <button class="btn" style="background: #666; margin-top: 10px;" onclick="testarConfigPreVendas()">Testar</button>
          <div id="prevenda_status" style="color: #aaa;"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCgNEaP7g_MKK15KSt_uyNfRe6yE4Hz8i0",
  authDomain: "dashboard-planejar.firebaseapp.com",
  projectId: "dashboard-planejar",
  storageBucket: "dashboard-planejar.firebasestorage.app",
  messagingSenderId: "864560134992",
  appId: "1:864560134992:web:2f72cf297372fb68ac4a55"
};

let db = null;
let currentUser = null;

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
} catch (e) {
  db = firebase.firestore();
}

function handleLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  
  if (user === 'adminmaster' && pass === '7252') {
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('adminLayout').classList.add('visible');
    currentUser = { email: 'adminmaster' };
  } else {
    document.getElementById('loginError').textContent = 'Credenciais invalidas';
    document.getElementById('loginError').style.display = 'block';
  }
}

function handleLogout() {
  document.getElementById('loginContainer').style.display = 'flex';
  document.getElementById('adminLayout').classList.remove('visible');
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  event.target.classList.add('active');
  
  if (tab === 'prevenda') {
    carregarConfigPreVendas();
  }
}

async function salvarConfigPreVendas() {
  const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  const config = {
    atendimento: { id: document.getElementById('prevenda_atend_id').value.trim(), gids: {} },
    vendas: { id: document.getElementById('prevenda_vend_id').value.trim(), gids: {} },
    gastos: { id: document.getElementById('prevenda_gast_id').value.trim(), gids: {} }
  };
  
  meses.forEach(mes => {
    config.atendimento.gids[mes] = document.getElementById('prevenda_atend_gid_' + mes).value.trim();
    config.vendas.gids[mes] = document.getElementById('prevenda_vend_gid_' + mes).value.trim();
    config.gastos.gids[mes] = document.getElementById('prevenda_gast_gid_' + mes).value.trim();
  });

  try {
    const statusDiv = document.getElementById('prevenda_status');
    statusDiv.innerHTML = 'Salvando...';
    statusDiv.style.color = '#aaa';

    if (db) {
      await db.collection('admin_config').doc('prevenda_julia').set({
        atendimento: config.atendimento,
        vendas: config.vendas,
        gastos: config.gastos,
        atualizadoEm: new Date().toISOString(),
        atualizadoPor: currentUser?.email || 'Admin'
      });
      console.log('Salvo no Firebase');
    }

    localStorage.setItem('prevenda_config', JSON.stringify(config));
    
    statusDiv.innerHTML = 'Salvo com sucesso!';
    statusDiv.style.color = '#10b981';
    console.log('Configuracao salva');
  } catch (error) {
    console.error('Erro:', error);
    document.getElementById('prevenda_status').innerHTML = 'Erro: ' + error.message;
    document.getElementById('prevenda_status').style.color = '#ef4444';
  }
}

async function carregarConfigPreVendas() {
  try {
    const doc = await db.collection('admin_config').doc('prevenda_julia').get();
    if (doc.exists()) {
      const config = doc.data();
      const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
      
      document.getElementById('prevenda_atend_id').value = config.atendimento?.id || '';
      document.getElementById('prevenda_vend_id').value = config.vendas?.id || '';
      document.getElementById('prevenda_gast_id').value = config.gastos?.id || '';
      
      meses.forEach(mes => {
        document.getElementById('prevenda_atend_gid_' + mes).value = config.atendimento?.gids?.[mes] || '';
        document.getElementById('prevenda_vend_gid_' + mes).value = config.vendas?.gids?.[mes] || '';
        document.getElementById('prevenda_gast_gid_' + mes).value = config.gastos?.gids?.[mes] || '';
      });
    }
  } catch (error) {
    console.error('Erro ao carregar:', error);
  }
}

function testarConfigPreVendas() {
  console.log('Atend ID:', document.getElementById('prevenda_atend_id').value);
  console.log('Vendas ID:', document.getElementById('prevenda_vend_id').value);
  console.log('Gastos ID:', document.getElementById('prevenda_gast_id').value);
  alert('Veja F12 Console');
}

window.handleLogin = handleLogin;
window.handleLogout = handleLogout;
window.switchTab = switchTab;
window.salvarConfigPreVendas = salvarConfigPreVendas;
window.carregarConfigPreVendas = carregarConfigPreVendas;
window.testarConfigPreVendas = testarConfigPreVendas;
</script>

</body>
</html>
